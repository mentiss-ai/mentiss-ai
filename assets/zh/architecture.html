<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentiss AI 产品架构图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
        }
        .glass-panel {
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Simplified Color Scheme - Matching README Style */
        .grad-blue { background: #f8fbff; border: 2px solid #1976d2; }
        .grad-green { background: #f8fff8; border: 2px solid #2e7d32; }
        .grad-purple { background: #fcf8ff; border: 2px solid #7b1fa2; }
        .grad-orange { background: #fffff8; border: 2px solid #e65100; }
        .grad-gray { background: #fafafa; border: 2px solid #616161; }

        /* Card Styles */
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            border-radius: 0.75rem;
            position: relative;
            z-index: 10;
            transition: all 0.3s ease;
            white-space: nowrap; /* Prevent text wrapping */
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .card-title { font-weight: 700; font-size: 1.125rem; margin-bottom: 0.25rem; color: #1e293b; }
        .card-sub { font-size: 0.875rem; color: #64748b; font-weight: 500; }
        
        /* Connector Lines SVG Overlay */
        .connector-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .arrow-path {
            fill: none;
            stroke-width: 2;
            marker-end: url(#arrowhead);
        }
        .arrow-text {
            font-size: 12px;
            font-weight: 600;
            background-color: white; /* Fallback */
        }
        .text-bg {
            fill: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

    <div class="relative w-full max-w-5xl bg-white p-12 rounded-2xl shadow-xl overflow-hidden min-w-[800px]">
        
        <!-- Header -->
        <div class="absolute top-6 left-8">
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Mentiss AI <span class="text-slate-400 font-normal">Architecture</span></h1>
        </div>

        <!-- Diagram Container -->
        <div class="relative mt-8 py-10" style="height: 600px;">
            
            <!-- SVG Overlay for Arrows -->
            <!-- Coordinates calibrated for ~1000px container width with px-12 padding -->
            <!-- Left Card Center X ~ 145 | Center Card Center X ~ 500 | Right Card Center X ~ 855 -->
            <svg class="connector-layer" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#666666" />
                    </marker>
                </defs>

                <!-- Platform -> Engine (Blue) (Adjusted to X=145) -->
                <path d="M 500 130 L 500 180 L 145 180 L 145 240" stroke="#1976d2" class="arrow-path" stroke-dasharray="0"/>
                <rect x="105" y="190" width="80" height="20" rx="4" class="text-bg" />
                <text x="145" y="205" text-anchor="middle" class="arrow-text" fill="#1976d2">产生数据</text>

                <!-- Platform -> Benchmark (Orange) (Adjusted to X=855) -->
                <path d="M 500 130 L 500 180 L 855 180 L 855 240" stroke="#e65100" class="arrow-path" />
                <rect x="815" y="190" width="80" height="20" rx="4" class="text-bg" />
                <text x="855" y="205" text-anchor="middle" class="arrow-text" fill="#e65100">直接评测</text>

                <!-- Engine -> Model (Purple) (Adjusted to accommodate wider gap) -->
                <!-- Start ~245, End ~400 -->
                <path d="M 245 300 L 400 300" stroke="#7b1fa2" class="arrow-path" />
                <rect x="300" y="285" width="50" height="20" rx="4" class="text-bg" />
                <text x="325" y="300" text-anchor="middle" class="arrow-text" fill="#7b1fa2">再训练</text>

                <!-- Model -> Benchmark (Orange) (Widened Gap Fix) -->
                <!-- Start ~600, End ~755 -->
                <path d="M 600 300 L 755 300" stroke="#e65100" class="arrow-path" />
                <rect x="645" y="285" width="70" height="20" rx="4" class="text-bg" />
                <text x="680" y="300" text-anchor="middle" class="arrow-text" fill="#e65100">再评测</text>

            </svg>

            <!-- Layer 1: Game Platform -->
            <div class="absolute w-full flex justify-center top-0">
                <div class="card grad-blue w-64 h-24 text-center">
                    <div class="card-title" style="color: #1976d2;">游戏平台</div>
                    <div class="card-sub" style="color: #1976d2;">狼人杀游戏环境</div>
                </div>
            </div>

            <!-- Layer 2: Middle Components -->
            <!-- Reduced padding from px-[100px] to px-12 to open up gaps -->
            <div class="absolute w-full flex justify-between items-center top-[250px] px-12">
                <!-- Data Engine -->
                <div class="card grad-green w-48 h-24 text-center">
                    <div class="card-title" style="color: #2e7d32;">数据引擎</div>
                    <div class="card-sub" style="color: #2e7d32;">合成数据，人类混合数据</div>
                </div>

                <!-- Model -->
                <div class="card grad-purple w-48 h-24 text-center mx-auto">
                    <div class="card-title" style="color: #7b1fa2;">模型</div>
                    <div class="card-sub" style="color: #7b1fa2;">SOTA模型，自研模型</div>
                </div>

                <!-- Benchmark -->
                <div class="card grad-orange w-48 h-24 text-center">
                    <div class="card-title" style="color: #e65100;">测评基准</div>
                    <div class="card-sub" style="color: #e65100;">社会智能评测</div>
                </div>
            </div>

            <!-- Layer 3: AGI Security -->
            <div class="absolute w-full flex justify-center bottom-0">
                <div class="card grad-gray w-80 h-24 text-center">
                    <div class="card-title" style="color: #424242;">AGI安全研究</div>
                    <div class="card-sub" style="color: #424242;">对齐观察 · 欺骗研究</div>
                </div>
            </div>

        </div>
        
        <!-- Footer / Legend -->
        <div class="mt-8 pt-4 border-t border-slate-100 flex justify-between text-xs text-slate-400">
            <span>Mentiss AI Technical Architecture v1.0</span>
            <span>Generated via Gemini</span>
        </div>
    </div>

</body>
</html>
